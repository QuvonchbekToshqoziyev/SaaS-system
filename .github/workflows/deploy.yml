name: Deploy Airline B2B

on:
  push:
    branches:
      - product/airline-b2b
      - main

concurrency:
  group: airline-b2b-deploy
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync backend and shared to server
        run: |
          rsync -avz --delete \
            --exclude="node_modules" --exclude="dist" --exclude=".env" --exclude="error-registry*.json" \
            ./airline-b2b/server/ root@${{ secrets.SERVER_IP }}:/root/airline-b2b/server/
          rsync -avz --delete \
            ./airline-b2b/shared/ root@${{ secrets.SERVER_IP }}:/root/airline-b2b/shared/

      - name: Rebuild and restart backend
        run: |
          ssh root@${{ secrets.SERVER_IP }} "cd /root/airline-b2b/server && pm2 stop airline-backend || true && rm -rf node_modules dist && npm ci && npx prisma generate && npx prisma db push && npm run build && pm2 restart airline-backend --update-env"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: airline-b2b/client/package-lock.json

      - name: Build frontend
        run: |
          cd airline-b2b/client
          npm ci
          npm run build

      - name: Install SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy static export
        run: |
          rsync -avz --delete ./airline-b2b/client/out/ root@${{ secrets.SERVER_IP }}:/var/www/airline-b2b/html/
